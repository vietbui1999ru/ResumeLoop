# Homelab observability stack for ResumeLoop
# Start:  docker compose -f infra/docker-compose.homelab.yml --env-file .env.homelab up -d
# Stop:   docker compose -f infra/docker-compose.homelab.yml down
# Logs:   docker compose -f infra/docker-compose.homelab.yml logs -f
#
# Prerequisites:
#   1. Run setup: bash infra/setup-homelab.sh (creates .env.homelab + secrets/metrics_token)
#   2. Forward port 4318 on your router to this host (OTEL Collector — public-facing)
#   3. Access Grafana via Tailscale: http://<tailscale-ip>:3000
#
# Security note: ECS sends OTLP traces to port 4318 over plain HTTP (no TLS).
# The bearer token protects against unauthenticated trace injection.
# This is an accepted trade-off for a personal homelab with no domain/TLS cert.
# Upgrade path: add a TLS reverse proxy (nginx/caddy) in front of the collector.
#
# Run from REPO ROOT: docker compose -f infra/docker-compose.homelab.yml --env-file .env.homelab up -d

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../secrets/metrics_token:/etc/prometheus/secrets/metrics_token:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - grafana-data:/var/lib/grafana
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infra/grafana/resumeloop-dashboard.json:/var/lib/grafana/dashboards/resumeloop.json:ro

  tempo:
    image: grafana/tempo:2.4.0
    restart: unless-stopped
    command: [-config.file=/etc/tempo.yml]
    volumes:
      - ../infra/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    # gRPC port 4317 is internal-only (not exposed)
    # Otel Collector connects via internal network; no TLS between collector and tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    restart: unless-stopped
    ports:
      - "4318:4318"
    environment:
      - OTEL_BEARER_TOKEN=${OTEL_BEARER_TOKEN}
    volumes:
      - ../infra/otel-collector.yml:/etc/otel/config.yml:ro
    command: [--config=/etc/otel/config.yml]
    depends_on:
      - tempo

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
