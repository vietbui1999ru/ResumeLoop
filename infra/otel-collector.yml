# OTEL Collector — public-facing trace receiver for ResumeLoop.
# Port 4318 (OTLP HTTP) receives traces from ECS Fargate over the public internet.
# Auth: bearer token via ${OTEL_BEARER_TOKEN} env var (set in .env.homelab).
# Trace pipeline: ECS → Collector (auth + batch) → Tempo (internal gRPC).
# Metrics pipeline: not used here — Prometheus scrapes app directly.
#
# Sampling and resource enrichment are follow-up improvements; not in scope for initial setup.

extensions:
  bearertokenauth:
    token: "${OTEL_BEARER_TOKEN}"

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp:
    endpoint: tempo:4317
    tls:
      # Internal Docker network only — Tempo port 4317 is not publicly exposed.
      # Upgrade to mTLS if this stack ever moves to a multi-tenant or shared network.
      insecure: true

service:
  extensions: [bearertokenauth]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
