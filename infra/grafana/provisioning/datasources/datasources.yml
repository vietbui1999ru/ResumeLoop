apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-homelab
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo-homelab
    url: http://tempo:3200
    editable: false
    jsonData:
      # tracesToLogsV2 omitted — no Loki in this stack. Add when Loki is deployed.
      serviceMap:
        datasourceUid: prometheus-homelab
      nodeGraph:
        enabled: true
