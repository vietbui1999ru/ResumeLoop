# Alert rules are managed by Grafana (see infra/grafana/provisioning/alerting/rules.yml).
# Prometheus handles metric storage and scraping only; Grafana evaluates alert conditions.
#
# Prerequisites for docker-compose: host must create secrets/metrics_token before `docker compose up`.
# See infra/docker-compose.homelab.yml and .env.homelab.example for setup instructions.

global:
  scrape_interval: 60s
  scrape_timeout: 15s
  evaluation_interval: 60s

scrape_configs:
  - job_name: resumeloop
    scheme: https
    metrics_path: /api/metrics/prometheus

    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/metrics_token

    static_configs:
      - targets:
          - fh7gi2vfe2.execute-api.us-east-1.amazonaws.com
        labels:
          env: production
          app: resumeloop

    tls_config:
      insecure_skip_verify: false
