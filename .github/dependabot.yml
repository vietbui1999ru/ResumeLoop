version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      framework:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      ai:
        patterns:
          - "@anthropic-ai/*"
          - "openai"
          - "@google/*"
      dev-tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript"
          - "vitest"
          - "@vitejs/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "actions/*"
      anthropic:
        patterns:
          - "anthropics/*"
