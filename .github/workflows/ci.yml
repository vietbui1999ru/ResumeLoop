name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test · Audit · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
