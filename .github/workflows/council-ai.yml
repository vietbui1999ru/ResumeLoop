name: Council AI Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true

jobs:
  review-gpt4o:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Compute diff
        run: |
          git fetch origin main --depth=1
          git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' > diff.txt
          if [ ! -s diff.txt ]; then
            echo '{"issues":[]}' > reviewer1.json
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Call GPT-4o via GitHub Models
        if: env.SKIP != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          cat > /tmp/system_prompt.txt << 'PROMPT'
          You are a code reviewer. Analyze the diff across exactly these 5 categories.
          Return ONLY valid JSON matching the schema below — no prose outside the JSON.

          Categories:
            security      — XSS, injection, auth bypass, path traversal, secret exposure
            correctness   — logic errors, wrong assumptions, broken edge cases, type unsafety
            performance   — unnecessary re-renders, N+1 queries, unbounded loops, memory leaks
            type_safety   — missing null checks, unsafe casts, implicit any, unhandled undefined
            dead_code     — unused imports, unreachable branches, stale variables

          Output schema:
          {
            "issues": [
              {
                "category": "security|correctness|performance|type_safety|dead_code",
                "severity": "HIGH|MED|LOW",
                "file": "path/to/file.ts",
                "line": 42,
                "title": "one-line description",
                "detail": "why this is a problem",
                "fix": "concrete fix as code snippet or clear instruction"
              }
            ]
          }
          PROMPT

          jq -n \
            --rawfile system /tmp/system_prompt.txt \
            --rawfile user diff.txt \
            '{
              model: "gpt-4o",
              response_format: {type: "json_object"},
              messages: [
                {role: "system", content: $system},
                {role: "user",   content: $user}
              ]
            }' > /tmp/request.json

          curl -sf --max-time 60 https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json \
            | jq -r '.choices[0].message.content' > reviewer1.json

          jq -e '.issues' reviewer1.json > /dev/null

      - name: Upload GPT-4o review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: reviewer1
          path: reviewer1.json

  review-llama:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Compute diff
        run: |
          git fetch origin main --depth=1
          git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' > diff.txt
          if [ ! -s diff.txt ]; then
            echo '{"issues":[]}' > reviewer2.json
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Call Llama-3.3-70B via GitHub Models
        if: env.SKIP != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          cat > /tmp/system_prompt.txt << 'PROMPT'
          You are a code reviewer. Analyze the diff across exactly these 5 categories.
          Return ONLY valid JSON matching the schema below — no prose outside the JSON.

          Categories:
            security      — XSS, injection, auth bypass, path traversal, secret exposure
            correctness   — logic errors, wrong assumptions, broken edge cases, type unsafety
            performance   — unnecessary re-renders, N+1 queries, unbounded loops, memory leaks
            type_safety   — missing null checks, unsafe casts, implicit any, unhandled undefined
            dead_code     — unused imports, unreachable branches, stale variables

          Output schema:
          {
            "issues": [
              {
                "category": "security|correctness|performance|type_safety|dead_code",
                "severity": "HIGH|MED|LOW",
                "file": "path/to/file.ts",
                "line": 42,
                "title": "one-line description",
                "detail": "why this is a problem",
                "fix": "concrete fix as code snippet or clear instruction"
              }
            ]
          }
          PROMPT

          jq -n \
            --rawfile system /tmp/system_prompt.txt \
            --rawfile user diff.txt \
            '{
              model: "Meta-Llama-3.3-70B-Instruct",
              response_format: {type: "json_object"},
              messages: [
                {role: "system", content: $system},
                {role: "user",   content: $user}
              ]
            }' > /tmp/request.json

          curl -sf --max-time 60 https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/request.json \
            | jq -r '.choices[0].message.content' > reviewer2.json

          jq -e '.issues' reviewer2.json > /dev/null

      - name: Upload Llama review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: reviewer2
          path: reviewer2.json

  synthesize:
    needs: [review-gpt4o, review-llama]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Compute diff (for Claude to read)
        shell: bash
        run: |
          set -eo pipefail
          git fetch origin main --depth=1
          git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' > diff.txt

      - name: Download reviewer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: reviewer*
          merge-multiple: true

      - name: Synthesize and post PR comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the council synthesizer. Two AI reviewers analyzed the PR diff and produced JSON.

            Files in the working directory:
            - reviewer1.json  — GPT-4o findings
            - reviewer2.json  — Meta-Llama-3.3-70B-Instruct findings
            - diff.txt        — the raw PR diff

            Execute these steps IN ORDER:

            1. Read all three files:
               cat reviewer1.json
               cat reviewer2.json
               wc -l diff.txt

            2. Merge issues by (file, line, category). Apply disagreement logic per group:
               - Both flag same (file, line, category) → include. Use higher severity if they differ; note discrepancy in detail block.
               - One flags, one silent → read diff.txt independently, decide include/skip, write your reasoning in the detail block with marker ⚠️ *disputed*
               - Both agree on severity → include as-is.

            3. For each included issue, run grep to find direct importers and call sites:
               BASENAME=$(basename <file> | sed 's/\..*//')
               grep -rn "from.*$BASENAME" --include="*.ts" --include="*.tsx" . 2>/dev/null | grep -v node_modules | head -5

            4. Generate a review UUID:
               REVIEW_UUID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || uuidgen)

            5. Write the PR comment to /tmp/council-comment.md using this exact structure:

               ## 🔍 Council AI Review
               > GPT-4o · Llama-3.3-70B · synthesized by Claude

               ---

               ### Security
               - [ ] 🔴 **HIGH** — `<file>:<line>` — <title>
                 <details><summary>Detail</summary>

                 <detail text>

                 **Fix:** <fix>

                 **Check these files too:**
                 - `<importer>:<line>` — <relationship note>
                 </details>

               [repeat per issue in this category; omit section if zero issues]

               ### Correctness
               [same structure — omit if no issues]

               ### Performance
               [same structure — omit if no issues]

               ### Type Safety
               [same structure — omit if no issues]

               ### Dead Code
               [same structure — omit if no issues]

               ---
               *Check the boxes for fixes you want applied, then post `/apply-fixes`.*
               <!-- council-review-id: ${{ github.run_id }}-$REVIEW_UUID -->

               Rules:
               - Severity icons: 🔴 HIGH, 🟡 MED, ⚪ LOW
               - Disputed issues: add ⚠️ *disputed* after the severity icon in the title line
               - The <!-- council-review-id: ... --> marker MUST be the very last line
               - Omit any category section with zero issues

            6. Post the comment:
               gh pr comment $PR_NUMBER --repo $REPO --body-file /tmp/council-comment.md

            Special case — if both reviewer files contain empty issues arrays:
               gh pr comment $PR_NUMBER --repo $REPO --body "## 🔍 Council AI Review

               No issues found in this diff by either reviewer. ✅"
               Then stop.
