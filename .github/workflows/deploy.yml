name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.claude/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: resumeloop
  ECS_CLUSTER: resumeloop
  ECS_SERVICE: resumeloop
  API_GW_ID: fh7gi2vfe2

# Required secrets:
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC (needs ECR + ECS + EC2 + APIGatewayV2 perms)

jobs:
  build-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to: type=gha,mode=max

  deploy-ecs:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb  # v1
        with:
          task-definition: infra/ecs-task-def.json
          container-name: resumeloop
          image: ${{ needs.build-push.outputs.ecr_registry }}/resumeloop:${{ needs.build-push.outputs.image_tag }}

      - name: Deploy to ECS service and wait for stability
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c  # v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment via API Gateway
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf \
              "https://$API_GW_ID.execute-api.$AWS_REGION.amazonaws.com/api/health" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null \
              || echo "error")
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 120s" && exit 1
