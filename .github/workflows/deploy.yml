name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: resumeloop

# Required secrets:
#   AWS_DEPLOY_ROLE_ARN      — IAM role ARN for OIDC
#   TAILSCALE_AUTHKEY        — Tailscale ephemeral auth key
#   HOMELAB_SSH_KEY          — private key (PEM) for homelab deploy user
#   HOMELAB_SSH_HOST_KEY     — known_hosts entry for homelab host
#   HOMELAB_USER             — SSH username on homelab
#   HOMELAB_HOST             — homelab hostname or Tailscale IP

jobs:
  build-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
                     "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  deploy-homelab:
    name: Deploy to homelab
    runs-on: ubuntu-latest
    needs: build-push
    permissions: {}

    steps:
      - name: Join Tailscale network
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d  # v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Add homelab SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.HOMELAB_SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          ECR_REGISTRY: ${{ needs.build-push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          HOMELAB_USER: ${{ secrets.HOMELAB_USER }}
          HOMELAB_HOST: ${{ secrets.HOMELAB_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              "$HOMELAB_USER@$HOMELAB_HOST" \
              "cd ~/resumeloop && \
               export IMAGE_TAG=$IMAGE_TAG ECR_REGISTRY=$ECR_REGISTRY && \
               aws ecr get-login-password --region us-east-1 \
                 | docker login --username AWS --password-stdin $ECR_REGISTRY && \
               docker compose -f docker-compose.prod.yml --env-file .env.prod pull app && \
               docker compose -f docker-compose.prod.yml --env-file .env.prod up -d && \
               for i in \$(seq 1 12); do \
                 curl -sf http://localhost:3010/api/health | grep '\"ok\":true' && break; \
                 [ \$i -eq 12 ] && echo 'Health check failed after 60s' && exit 1; \
                 sleep 5; \
               done"
