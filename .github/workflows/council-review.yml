name: Council Review — auto-fix PR review comments

# Fires when any reviewer submits a review (not just @claude mentions).
# Claude reads ALL open review comments, reasons about which are actionable,
# and applies consensus fixes in a single commit.
#
# Required secret: CLAUDE_CODE_OAUTH_TOKEN
# Required repo setting: Settings → Actions → Allow GitHub Actions to create
#   and approve pull requests (for contents: write to work on PRs)

on:
  pull_request_review:
    types: [submitted]

jobs:
  council:
    # Only run for trusted collaborators — prevents prompt injection via external reviewer bodies
    if: |
      github.event.review.state != 'approved' &&
      !startsWith(github.event.review.user.login, 'claude') &&
      github.event.review.user.login != 'github-actions[bot]' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.review.author_association)

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # Use the SHA (immutable) rather than the branch ref to avoid
          # branch-name injection risk while still checking out PR head
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Apply council review fixes
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REVIEWER: ${{ github.event.review.user.login }}
          REPO: ${{ github.repository }}
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A reviewer just submitted a review on this PR. Your role: council synthesizer.
            Read every open review comment, reason about which changes are technically correct,
            then apply consensus fixes in a single commit.

            Context (from env):
            - PR: $PR_NUMBER in $REPO
            - Reviewer: $REVIEWER
            - Branch: $PR_HEAD_REF

            Process:
            1. Fetch inline review comments:
               gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
                 --jq '[.[] | {path, line, body, user: .user.login}]'
            2. Fetch PR-level review bodies:
               gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
                 --jq '[.[] | select(.state != "APPROVED") | {user: .user.login, state, body}]'
            3. For each comment decide: real bug, doc drift, or valid correctness issue?
               Skip: already-resolved items, pure style preferences, out-of-scope feature requests.
            4. Apply every actionable fix directly to the source files.
            5. If changes were made, push them:
               git add -- $(git diff --name-only HEAD)
               git commit -m "fix: address review comments from $REVIEWER"
               git push origin "$PR_HEAD_REF"
            6. If nothing actionable — do nothing. No empty commits.

            Be conservative: when in doubt whether a comment is actionable, skip it.
